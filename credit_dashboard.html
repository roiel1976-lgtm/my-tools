<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1f2535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #7a8099;
  --accent: #4f8ef7;
  --accent2: #7fd3b5;
  --danger: #f06565;
  --warn: #f0b865;
  --cat-tech: #4f8ef7;
  --cat-food: #4fc78f;
  --cat-gov: #f06565;
  --cat-ins: #d06bcf;
  --cat-prof: #8f7ef0;
  --cat-misc: #8a8fa8;
  --cat-home: #e09050;
  --cat-leisure: #f08060;
  --cat-health: #4fd5c5;
  --cat-shop: #80bf50;
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { display: flex; align-items: center; gap: 14px; }
.card-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, #2a4a8f, #1a2a5f);
  border: 1px solid rgba(79,142,247,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
.month-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 6px 16px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; font-family: 'Heebo', sans-serif;
  transition: all .2s;
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 500;
}

/* ── MAIN ── */
.main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

/* ── METRICS ── */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.metric:hover { border-color: var(--border2); }
.metric::before {
  content: ''; position: absolute;
  top: 0; right: 0; width: 3px; height: 100%;
}
.metric.blue::before { background: var(--accent); }
.metric.green::before { background: var(--accent2); }
.metric.red::before { background: var(--danger); }
.metric.warn::before { background: var(--warn); }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.metric-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.metric-value.mono { font-family: 'IBM Plex Mono', monospace; font-size: 20px; }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── ALERTS ── */
.alerts { margin-bottom: 28px; }
.alerts-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.alerts-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.alert {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 13px 16px; border-radius: 8px; margin-bottom: 8px;
  border: 1px solid transparent;
  animation: fadeIn .3s ease;
}
.alert-danger { background: rgba(240,101,101,0.08); border-color: rgba(240,101,101,0.2); }
.alert-warn { background: rgba(240,184,101,0.08); border-color: rgba(240,184,101,0.2); }
.alert-info { background: rgba(79,142,247,0.08); border-color: rgba(79,142,247,0.2); }
.alert-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
.alert-danger .alert-icon { color: var(--danger); }
.alert-warn .alert-icon { color: var(--warn); }
.alert-info .alert-icon { color: var(--accent); }
.alert-body strong { display: block; font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.alert-body span { font-size: 12px; color: var(--muted); line-height: 1.5; }
.alert-danger .alert-body strong { color: #f09090; }
.alert-warn .alert-body strong { color: #f0c080; }
.alert-info .alert-body strong { color: #80b0f7; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
}
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

/* ── BAR CHART ── */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 12px; }
.bar-label { width: 130px; text-align: right; color: var(--text); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
.bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.bar-amt { width: 80px; text-align: left; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

/* ── MONTHLY BARS ── */
.month-bars { display: flex; align-items: flex-end; gap: 16px; height: 120px; margin-top: 8px; }
.month-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.month-bar-track { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }
.month-bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height .6s cubic-bezier(.4,0,.2,1); }
.month-label { font-size: 11px; color: var(--muted); }
.month-amt { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text); }

/* ── TRANSACTIONS ── */
.txn-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.txn-header {
  padding: 16px 20px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 10px;
}
.txn-header h2 { font-size: 13px; font-weight: 500; color: var(--text); }
.txn-total { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
table { width: 100%; border-collapse: collapse; }
thead tr { background: rgba(255,255,255,0.03); }
th {
  padding: 10px 14px; font-size: 10px; color: var(--muted);
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); text-align: right;
}
th.l { text-align: left; }

/* GROUP ROW */
.group-row { cursor: pointer; transition: background .15s; }
.group-row:hover { background: rgba(255,255,255,0.03); }
.group-row td { padding: 13px 14px; border-bottom: 1px solid var(--border); }
.group-row.open { background: rgba(255,255,255,0.02); }
.g-name-cell { display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.g-name { font-weight: 500; font-size: 13px; color: var(--text); }
.g-count { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 7px; border-radius: 10px; }
.chevron { color: var(--muted); font-size: 12px; margin-right: auto; transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }
.g-total { font-family: 'IBM Plex Mono', monospace; font-weight: 500; color: var(--text); font-size: 13px; text-align: left; }

/* SUB ROW */
.sub-row { animation: fadeIn .15s ease; }
.sub-row td { padding: 9px 14px 9px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); background: rgba(0,0,0,0.15); font-size: 12px; }
.sub-row:last-of-type td { border-bottom: 1px solid var(--border); }
.sub-date { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.sub-biz { color: var(--text); }
.sub-month { color: var(--muted); font-size: 11px; }
.sub-amt { font-family: 'IBM Plex Mono', monospace; color: var(--text); font-size: 12px; text-align: left; }
.sub-orig { font-size: 10px; color: var(--muted); display: block; }

/* BADGES */
.bdg { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin-right: 6px; vertical-align: middle; }
.bdg-q { background: rgba(79,215,181,0.15); color: #4fd5c5; border: 1px solid rgba(79,215,181,0.2); }
.bdg-f { background: rgba(240,184,101,0.15); color: var(--warn); border: 1px solid rgba(240,184,101,0.2); }
.bdg-p { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
.bdg-alert { background: rgba(240,101,101,0.15); color: var(--danger); border: 1px solid rgba(240,101,101,0.2); }

.no-data { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ── FOOTER ── */
.footer { text-align: center; padding: 32px; color: var(--muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; }

@media (max-width: 700px) {
  .metrics { grid-template-columns: 1fr 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .main { padding: 16px; }
  .header { padding: 14px 16px; }
  .bar-label { width: 90px; }
}
</style>

const MONTHS_LIST = ['כל התקופה','אפריל 2026','מאי 2026','יוני 2026'];
const MONTH_TOTALS = {'אפריל 2026':44773,'מאי 2026':23488,'יוני 2026':35182};
const MONTH_COLORS = {'אפריל 2026':'#f06565','מאי 2026':'#4f8ef7','יוני 2026':'#4fc78f'};

let curMonth = 'כל התקופה';
const openGroups = new Set();

function filtered() {
  if(curMonth === 'כל התקופה') return DATA;
  return DATA.filter(d => d.m === curMonth);
}

function fmtN(n) {
  if(n == null) return '—';
  return n.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₪';
}
function fmtI(n) { return Math.round(n).toLocaleString('he-IL') + ' ₪'; }

function setMonth(m) {
  curMonth = m;
  openGroups.clear();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.m === m));
  render();
}

function buildGroups(data) {
  const m = {};
  data.forEach(d => {
    const cat = d.o;
    if(!m[cat]) m[cat] = {items:[], total:0, count:0, alertCount:0};
    m[cat].items.push(d);
    m[cat].total += d.c || 0;
    m[cat].count++;
    if(d.n === 'חשוד') m[cat].alertCount++;
  });
  return Object.entries(m).sort((a,b) => b[1].total - a[1].total);
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = MONTHS_LIST.map(m =>
    `<button class="tab${m===curMonth?' active':''}" data-m="${m}" onclick="setMonth('${m}')">${m}</button>`
  ).join('');
}

function renderMetrics(data) {
  const total = data.reduce((s,d) => s+(d.c||0), 0);
  const cnt = data.length;
  const rec = data.filter(d=>d.tp==='הוראת קבע').reduce((s,d)=>s+(d.c||0),0);
  const alerts = data.filter(d=>d.n==='חשוד').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric blue">
      <div class="metric-label">סה"כ חיובים</div>
      <div class="metric-value mono">${fmtI(total)}</div>
      <div class="metric-sub">${curMonth}</div>
    </div>
    <div class="metric green">
      <div class="metric-label">מספר עסקאות</div>
      <div class="metric-value">${cnt}</div>
      <div class="metric-sub">עסקאות</div>
    </div>
    <div class="metric warn">
      <div class="metric-label">הוראות קבע</div>
      <div class="metric-value mono">${fmtI(rec)}</div>
      <div class="metric-sub">מנויים קבועים</div>
    </div>
    <div class="metric red">
      <div class="metric-label">עסקאות לבדיקה</div>
      <div class="metric-value">${alerts}</div>
      <div class="metric-sub">עסקאות חשודות</div>
    </div>`;
}

function renderAlerts(data) {
  const alerts = [];
  const mumble = data.filter(d=>d.b.includes('MUMBLE'));
  if(mumble.length) {
    const tot = mumble.reduce((s,d)=>s+(d.c||0),0);
    alerts.push({t:'danger', icon:'⚠', title:`MUMBLE GROUP — ${mumble.length} עסקאות, ${fmtI(tot)}`,
      text:'החיוב בפועל כפול עד שלוש מהסכום המקורי. בדוק מהו השירות.'});
  }
  const samit = data.filter(d=>d.b.includes('סאמיט'));
  if(samit.length) {
    const tot = samit.reduce((s,d)=>s+(d.c||0),0);
    alerts.push({t:'warn', icon:'🔁', title:`סאמיט — ${samit.length} הוראות קבע, ${fmtI(tot)}`,
      text:'חיובים מרובים באותו יום בסכומים שונים. ודא שאין כפל מנויים.'});
  }
  const vat = data.filter(d=>d.b.includes('מעמ'));
  if(vat.length) {
    const tot = vat.reduce((s,d)=>s+(d.c||0),0);
    alerts.push({t:'danger', icon:'🏛', title:`גביית מעמ — ${vat.length} תשלומים, ${fmtI(tot)}`,
      text:'סכומים גבוהים מאוד. ודא שכל תשלום מאושר ומוכר.'});
  }
  const ong = data.filter(d=>d.b.includes('אונגלס'));
  if(ong.length) {
    alerts.push({t:'warn', icon:'📅', title:`אונגלס בעמ — 3,540 ₪ חוזר כל חודש`,
      text:'תשלום קבוע זהה 3 חודשים ברציפות. האם זו השכרה / מנוי מוכר?'});
  }
  document.getElementById('alerts').innerHTML = alerts.map(a =>
    `<div class="alert alert-${a.t}">
      <div class="alert-icon">${a.icon}</div>
      <div class="alert-body"><strong>${a.title}</strong><span>${a.text}</span></div>
    </div>`
  ).join('') || '<div class="alert alert-info"><div class="alert-icon">✓</div><div class="alert-body"><strong>אין התראות בחודש זה</strong></div></div>';
}

function renderCatBars(data) {
  const groups = buildGroups(data);
  const max = groups[0] ? groups[0][1].total : 1;
  document.getElementById('cat-bars').innerHTML = groups.slice(0,8).map(([cat,{total}]) =>
    `<div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(total/max*100).toFixed(1)}%;background:${CAT_COLOR[cat]||'#888'}"></div></div>
      <div class="bar-amt">${Math.round(total).toLocaleString()}</div>
    </div>`
  ).join('');
}

function renderMonthBars() {
  const entries = Object.entries(MONTH_TOTALS);
  const maxV = Math.max(...entries.map(e=>e[1]));
  document.getElementById('month-bars').innerHTML = entries.map(([m,v]) =>
    `<div class="month-bar-wrap">
      <div class="month-amt">${Math.round(v/1000)}K</div>
      <div class="month-bar-track">
        <div class="month-bar-fill" style="height:${(v/maxV*100).toFixed(0)}%;background:${MONTH_COLORS[m]};min-height:4px"></div>
      </div>
      <div class="month-label">${m.replace(' 2026','')}</div>
    </div>`
  ).join('');
}

function toggleGroup(cat) {
  if(openGroups.has(cat)) openGroups.delete(cat);
  else openGroups.add(cat);
  renderTable();
}

function renderTable() {
  const data = filtered();
  const groups = buildGroups(data);
  const grandTotal = data.reduce((s,d)=>s+(d.c||0),0);
  document.getElementById('txn-total').textContent = `${data.length} עסקאות · ${fmtI(grandTotal)}`;

  let html = '';
  groups.forEach(([cat,{items,total,count,alertCount}]) => {
    const open = openGroups.has(cat);
    const color = CAT_COLOR[cat] || '#888';
    const alertBadge = alertCount ? `<span class="bdg bdg-alert">⚠ ${alertCount}</span>` : '';
    html += `<tr class="group-row${open?' open':''}" onclick="toggleGroup('${cat.replace(/'/g,"\\'")}')">
      <td><span class="dot" style="background:${color}"></span></td>
      <td><span style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:500;font-size:13px;color:var(--text)">${cat}</span>
        ${alertBadge}
        <span style="margin-right:auto;color:var(--muted);font-size:11px">${open?'▲':'▼'}</span>
      </span></td>
      <td style="text-align:center"><span class="g-count">${count}</span></td>
      <td></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text);font-size:13px">${fmtI(total)}</td>
    </tr>`;
    if(open) {
      items.sort((a,b) => b.d.localeCompare(a.d)).forEach(d => {
        const isForex = d.t && d.c && Math.abs(d.c - d.t) > 1;
        const isPending = d.n && d.n.includes('קליטה');
        const isAlert = d.n === 'חשוד';
        const isRec = d.tp === 'הוראת קבע';
        let bdg = '';
        if(isAlert) bdg += '<span class="bdg bdg-alert">חשוד</span>';
        if(isRec) bdg += '<span class="bdg bdg-q">ק.קבע</span>';
        if(isPending) bdg += '<span class="bdg bdg-p">בקליטה</span>';
        if(isForex && !isAlert) bdg += '<span class="bdg bdg-f">מט"ח</span>';
        const origNote = isForex ? `<span class="sub-orig">(עסקה: ${fmtN(d.t)})</span>` : '';
        const chgDisplay = d.c != null ? fmtN(d.c) : '<span style="color:var(--muted)">בקליטה</span>';
        html += `<tr class="sub-row">
          <td class="sub-date">${d.d.slice(5)}</td>
          <td class="sub-biz">${d.b} ${bdg}</td>
          <td class="sub-month" style="text-align:center">${d.m.replace(' 2026','')}</td>
          <td></td>
          <td class="sub-amt">${chgDisplay}${origNote}</td>
        </tr>`;
      });
    }
  });
  document.getElementById('tbody').innerHTML = html || `<tr><td colspan="5" class="no-data">אין עסקאות</td></tr>`;
}

function render() {
  const data = filtered();
  renderMetrics(data);
  renderAlerts(data);
  renderCatBars(data);
  renderMonthBars();
  renderTable();
}

renderTabs();
render();
</script>
</body>
</html>
